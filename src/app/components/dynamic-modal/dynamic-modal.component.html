<div *ngIf="item" class="modal-backdrop" (click)="close()">
  <div class="modal-card" (click)="$event.stopPropagation()">
    <button class="close-btn" aria-label="Close modal" (click)="close()">✕</button>

    <div class="modal-header">
      <div class="media-wrap" *ngIf="hasImage()">
        <img *ngIf="item.image" [src]="item.image" [alt]="getTitle()" class="media-img" />
        <img *ngIf="!item.image && item.icon1" [src]="item.icon1" [alt]="getTitle()" class="media-img" />
        <img *ngIf="!item.image && !item.icon1 && item.icon" [src]="item.icon" [alt]="getTitle()" class="media-img" />
      </div>
      <h2>{{ getTitle() }}</h2>
      <small class="section-badge">{{ section | uppercase }}</small>
    </div>

    <div class="modal-body">
      <div class="image-gallery" *ngIf="hasImages()">
        <img *ngFor="let img of getImages()" [src]="img" [alt]="getTitle() + ' screenshot'" class="gallery-img" />
      </div>
      <p>{{ getBody() }}</p>
      <ng-container *ngIf="item.link && item.link !== '#'">
        <a [href]="item.link" target="_blank" rel="noopener noreferrer" class="link-btn">Open resource</a>
      </ng-container>
    </div>
  </div>
</div>
