   <div id="work" class="w-full px-[12%] py-10 scroll-mt-20">
            <h4 class="text-center mb-2 text-lg font-Ovo">My portfolio</h4>
            <h2 class="text-center text-5xl font-Ovo">My latest work</h2>
            <p class="text-center max-w-2xl mx-auto mt-5 mb-12 font-Ovo">Welcome to my web development portfolio! Explore a collection of projects showcasing my expertise in front-end development.</p>

            <div class="grid grid-cols-auto my-10 gap-5 [html[data-theme=dark]_&]:text-black">
               
                    <div *ngFor="let work of works, index as i" class="aspect-square bg-no-repeat bg-cover bg-center rounded-lg relative cursor-pointer group" [ngStyle]="{'background-image': 'url(' + work.image + ')'}">
                        <div class="bg-white w-10/12 rounded-md absolute bottom-5 left-1/2 -translate-x-1/2 py-3 px-5 flex items-center justify-between duration-500 group-hover:bottom-7">
                            <div>
                                <h2 class="font-semibold">{{work.name}}</h2>
                                <p class="text-sm text-gray-700">{{work.description}}</p>
                            </div>
                            <div class="border rounded-full border-black w-9 aspect-square flex items-center justify-center shadow-[2px_2px_0_#000] group-hover:bg-lime-300 transition">
                                <img src="./assets/img/send-icon.png" alt="" class="w-5" />
                            </div>
                        </div>
                    </div>
            </div>
            <a href="#" class="w-max flex items-center justify-center gap-2 text-gray-700 border border-gray-300 [html[data-theme=dark]_&]:border-white/25 hover:bg-slate-100/70 [html[data-theme=dark]_&]:hover:bg-darkHover rounded-full py-2 px-8 mx-auto my-20 duration-300 [html[data-theme=dark]_&]:text-white">
                Show more
                <img src="./assets/img/right-arrow-bold.png" alt="" class="w-4 [html[data-theme=dark]_&]:hidden" />
                <img src="./assets/img/right-arrow-bold-dark.png" alt="" class="w-4 hidden [html[data-theme=dark]_&]:block" />
            </a>

        </div>
</section>
