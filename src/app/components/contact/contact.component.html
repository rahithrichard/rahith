<section id="contact">
<div
  class="w-full px-[12%] py-10 scroll-mt-20 bg-no-repeat bg-[length:90%_auto] bg-center dark:bg-none"
>
  <h4 class="text-center mb-2 text-lg font-Ovo">Connect with me</h4>
  <h2 class="text-center text-5xl font-Ovo">Get in touch</h2>

  <p class="text-center max-w-2xl mx-auto mt-5 mb-12 font-Ovo">
    I'd love to hear from you! If you have any questions, comments or feedback,
    please use the form below.
  </p>

  <form class="max-w-2xl mx-auto" (submit)="onSubmit($event)">
    <input
      type="hidden"
      name="subject"
      value="Eliana Jade - New form Submission"
    />

    <div class="grid grid-cols-auto gap-6 mt-10 mb-8">
      <input
        type="text"
        name="name"
        required
        placeholder="Enter your name"
        class="flex-1 px-3 py-2 outline-none border border-gray-300 dark:border-white/30 rounded-md bg-white dark:bg-darkHover/30 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400"
      />

      <input
        type="email"
        name="email"
        required
        placeholder="Enter your email"
        class="flex-1 px-3 py-2 outline-none border border-gray-300 dark:border-white/30 rounded-md bg-white dark:bg-darkHover/30 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400"
      />
    </div>

    <textarea
      rows="6"
      name="message"
      required
      placeholder="Enter your message"
      class="w-full px-4 py-2 outline-none border border-gray-300 dark:border-white/30 rounded-md bg-white mb-6 dark:bg-darkHover/30 text-gray-900 dark:text-white placeholder-gray-500 dark:placeholder-gray-400"
    ></textarea>

    <div class="h-captcha mb-6 max-w-full" data-captcha="true"></div>

    <button
      type="submit"
      class="py-2 px-8 w-max flex items-center gap-2 bg-black/80 text-white rounded-full mx-auto hover:bg-black duration-500 dark:bg-transparent dark:border dark:border-white/30 dark:hover:bg-darkHover"
    >
      Submit now
      <img src="./assets/img/right-arrow-white.png" class="w-4" alt="" />
    </button>

    <p class="mt-4 text-center">{{ result }}</p>
  </form>
</div>
</section>
