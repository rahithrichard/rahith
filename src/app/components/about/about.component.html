<section id="about">
    <div class="w-full px-[12%] py-10 scroll-mt-20">
            <h4 class="text-center mb-2 text-lg font-Ovo">Introduction</h4>
            <h2 class="text-center text-5xl font-Ovo">About me</h2>

            <div class="flex w-full flex-col lg:flex-row items-center gap-20 my-20">
                <div class="max-w-max mx-auto relative">
                    <img src='./assets/img/user_image.png' alt="" class="w-64 sm:w-80 rounded-3xl max-w-none" />

                    <div class="bg-white w-1/2 aspect-square absolute right-0 bottom-0 rounded-full translate-x-1/4 translate-y-1/3 shadow-[0_4px_55px_rgba(149,0,162,0.15)] flex items-center justify-center">
                        <img src="./assets/img/circular-text.png" alt="" class="w-full animate-spin_slow" />
                        <img src="./assets/img/dev-icon.png" alt="" class="w-1/4 absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2" />
                    </div>
                </div>
                <div class="flex-1">
                    <p class="mb-10 max-w-2xl font-Ovo">{{summary}}</p>

                    <ul class="grid grid-cols-1 sm:grid-cols-3 gap-6 max-w-2xl">
                            <li *ngFor="let data of data" class="border border-gray-300 [html[data-theme=dark]_&]:border-white/30 rounded-xl p-6 cursor-pointer hover:bg-lightHover hover:-translate-y-1 duration-500 hover:shadow-black [html[data-theme=dark]_&]:hover:shadow-white/80 [html[data-theme=dark]_&]:hover:bg-darkHover/50">
                                <img [src]="data.icon1" alt="" class="w-7 mt-3 [html[data-theme=dark]_&]:hidden" />
                                <img [src]="data.icon2" alt="" class="w-7 mt-3 hidden [html[data-theme=dark]_&]:block" />
                                <h3 class="my-4 font-semibold text-gray-700 [html[data-theme=dark]_&]:text-white">{{data.name}}</h3>
                                <p class="text-gray-600 text-sm [html[data-theme=dark]_&]:text-white/80">{{data.description}}</p>
                            </li>
                    </ul>
                    <h4 class="my-6 text-gray-700 font-Ovo [html[data-theme=dark]_&]:text-white/80">Tools i use</h4>

                    <ul class="flex items-center gap-3 sm:gap-5">
                        <li *ngFor="let tool of tools" class="flex items-center justify-center w-12 sm:w-14 aspect-square border border-gray-300 [html[data-theme=dark]_&]:border-white/30 rounded-lg cursor-pointer hover:-translate-y-1 duration-500">
                            <img [src]="tool.icon" [alt]="tool.name" class="w-5 sm:w-7" />
                        </li>
                    </ul>
                </div>
            </div>
        </div>
</section>
